    // --- DEVICE FINGERPRINT IMPLEMENTATION ---
    function getDeviceFingerprint() {
      try {
        const components = [
          navigator.userAgent || '',
          navigator.language || '',
          screen.width.toString(),
          screen.height.toString(),
          screen.colorDepth.toString(),
          new Date().getTimezoneOffset().toString(),
          getCanvasFingerprint()
        ];
        const rawString = components.join('###');
        return hashString(rawString);
      } catch (e) {
        let fallbackId = localStorage.getItem('roztaskpro_fallback_device_id');
        if (!fallbackId) {
          fallbackId = 'dev_fallback_' + Math.random().toString(36).substring(2, 15);
          localStorage.setItem('roztaskpro_fallback_device_id', fallbackId);
        }
        return fallbackId;
      }
    }

    function getCanvasFingerprint() {
      try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) return 'no-canvas';
        canvas.width = 200;
        canvas.height = 50;
        ctx.textBaseline = "top";
        ctx.font = "14px 'Arial'";
        ctx.textBaseline = "alphabetic";
        ctx.fillStyle = "#f60";
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = "#069";
        ctx.fillText("RoztaskPro, 1-Phone-1-ID!", 2, 15);
        ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
        ctx.fillText("RoztaskPro, 1-Phone-1-ID!", 4, 17);
        return canvas.toDataURL();
      } catch (e) {
        return 'canvas-error';
      }
    }

    function hashString(str) {
      let hash = 5381;
      for (let i = 0; i < str.length; i++) {
        hash = (hash * 33) ^ str.charCodeAt(i);
      }
      return 'RTP_' + Math.abs(hash).toString(36).toUpperCase();
    }

    // --- AUTH VIEW COMPONENT ---
    function AuthView({ onAuthSuccess }) {
      const [mobile, setMobile] = useState('');
      const [enteredOtp, setEnteredOtp] = useState('');
      const [referralCodeInput, setReferralCodeInput] = useState('');
      const [step, setStep] = useState('mobile');
      const [generatedOtp, setGeneratedOtp] = useState('');
      const [isSending, setIsSending] = useState(false);
      const [isVerifying, setIsVerifying] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [infoMsg, setInfoMsg] = useState('');

      const deviceId = getDeviceFingerprint();

      const handleSendOtp = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        setInfoMsg('');

        const mobilePattern = /^[6-9]\d{9}$/;
        if (!mobilePattern.test(mobile)) {
          setErrorMsg('Please enter a valid 10-digit Indian mobile number.');
          return;
        }

        setIsSending(true);

        try {
          // 1. Check duplicate phone signup on device
          const deviceRef = db.collection('devices').doc(deviceId);
          const deviceSnap = await deviceRef.get();

          if (deviceSnap.exists) {
            const userQuerySnap = await db.collection('users').where('deviceId', '==', deviceId).get();
            let existingUserMobile = '';
            userQuerySnap.forEach((uDoc) => {
              existingUserMobile = uDoc.data().mobile;
            });

            if (existingUserMobile && existingUserMobile !== mobile) {
              setErrorMsg(`1 Phone = 1 Account Only! Your device already has an account associated with ******${existingUserMobile.substring(6)}.`);
              setIsSending(false);
              return;
            }
          }

          // Mock OTP generator
          const mockOtp = '123456';
          setGeneratedOtp(mockOtp);

          setTimeout(() => {
            setStep('otp');
            setInfoMsg(`OTP sent to +91 ${mobile}! For testing, enter code: ${mockOtp}`);
            setIsSending(false);
          }, 800);

        } catch (e) {
          console.error(e);
          setErrorMsg('Error checking device security registry.');
          setIsSending(false);
        }
      };

      const handleVerifyOtp = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        setInfoMsg('');

        if (enteredOtp !== generatedOtp) {
          setErrorMsg('Incorrect verification code. Please try again.');
          return;
        }

        setIsVerifying(true);

        try {
          // Check if mobile user exists
          const userSnap = await db.collection('users').where('mobile', '==', mobile).get();
          let existingUserDoc = null;
          userSnap.forEach((uDoc) => {
            existingUserDoc = { ...uDoc.data() };
          });

          if (existingUserDoc) {
            const userObj = existingUserDoc;
            if (userObj.deviceId !== deviceId) {
              const devSnap = await db.collection('devices').doc(deviceId).get();
              if (devSnap.exists && devSnap.data().associatedUid !== userObj.uid) {
                setErrorMsg('1 Phone = 1 Account Only! This device is registered to another account.');
                setIsVerifying(false);
                return;
              }
              // Update user device safely
              await db.collection('devices').doc(deviceId).set({
                deviceId,
                associatedUid: userObj.uid,
                createdAt: new Date().toISOString()
              });
              await db.collection('users').doc(userObj.uid).set({ deviceId }, { merge: true });
              userObj.deviceId = deviceId;
            }
            onAuthSuccess(userObj);
            setIsVerifying(false);
            return;
          }

          // New Sign-up flow
          // Verify duplicate devices on registration
          const finalDeviceSnap = await db.collection('devices').doc(deviceId).get();
          if (finalDeviceSnap.exists) {
            setErrorMsg('1 Phone = 1 Account Only! This device already holds a registered account.');
            setIsVerifying(false);
            return;
          }

          // Handle referral verification
          let referrerUid = '';
          let referrerData = null;

          if (referralCodeInput.trim()) {
            const refCode = referralCodeInput.trim().toUpperCase();
            const refSnap = await db.collection('users').where('referralCode', '==', refCode).get();
            refSnap.forEach((rDoc) => {
              referrerUid = rDoc.id;
              referrerData = rDoc.data();
            });

            if (!referrerData) {
              setErrorMsg('Invalid referral code entered. Leave blank if none.');
              setIsVerifying(false);
              return;
            }

            if (referrerData.blocked) {
              setErrorMsg('This referral code belongs to a suspended account.');
              setIsVerifying(false);
              return;
            }
          }

          const uid = 'usr_' + Date.now() + Math.random().toString(36).substring(2, 7);
          const userReferralCode = 'ROZ' + Math.random().toString(36).substring(2, 7).toUpperCase();

          const newUserProfile = {
            uid,
            mobile,
            deviceId,
            balance: 10, // Join bonus ₹10
            totalEarned: 10,
            totalReferrals: 0,
            referralCode: userReferralCode,
            profileCompleted: false,
            blocked: false,
            isAdmin: false,
            createdAt: new Date().toISOString()
          };

          // Firestore Transaction
          await db.runTransaction(async (transaction) => {
            if (referrerData && referrerUid) {
              newUserProfile.referredBy = referrerData.referralCode;
              const refDocRef = db.collection('users').doc(referrerUid);
              transaction.update(refDocRef, {
                balance: referrerData.balance + 20,
                totalEarned: referrerData.totalEarned + 20,
                totalReferrals: referrerData.totalReferrals + 1
              });
            }

            const newUserRef = db.collection('users').doc(uid);
            transaction.set(newUserRef, newUserProfile);

            const newDeviceRef = db.collection('devices').doc(deviceId);
            transaction.set(newDeviceRef, {
              deviceId,
              associatedUid: uid,
              createdAt: new Date().toISOString()
            });
          });

          onAuthSuccess(newUserProfile);

        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || 'Verification process failed.');
        } finally {
          setIsVerifying(false);
        }
      };

      return (
        <div className="flex flex-col justify-center min-h-[85vh] px-4 animate-fade-in">
          <div className="text-center mb-6">
            <div className="w-16 h-16 rounded-3xl bg-gradient-to-tr from-brand-orange to-brand-green flex items-center justify-center text-white font-display font-black text-3xl shadow-lg mx-auto mb-3 animate-pulse-slow">
              R
            </div>
            <h1 className="text-3xl font-display font-black tracking-tight">
              <span className="text-brand-green">Roz</span>
              <span className="text-brand-orange">taskPro</span>
            </h1>
            <p className="text-xs text-gray-400 mt-1 font-semibold uppercase tracking-wider font-mono">India's Premium UPI Earning App</p>
          </div>

          <div className="bg-white border border-gray-100 rounded-3xl p-6 shadow-md space-y-4">
            {step === 'mobile' ? (
              <form onSubmit={handleSendOtp} className="space-y-4">
                <div className="text-center">
                  <h2 className="text-lg font-bold text-gray-800">Login / Sign Up</h2>
                  <p className="text-xs text-gray-400 mt-1">Get ₹10 Join Bonus instantly!</p>
                </div>

                {errorMsg && (
                  <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-2xl text-xs font-semibold flex items-start space-x-2">
                    <Icon name="alertTriangle" size={16} className="text-brand-orange shrink-0 mt-0.5" />
                    <span>{errorMsg}</span>
                  </div>
                )}

                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase font-mono tracking-wider">Mobile Number</label>
                  <div className="relative mt-1.5">
                    <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">+91</span>
                    <input
                      type="tel"
                      required
                      maxLength={10}
                      placeholder="Enter 10-digit number"
                      value={mobile}
                      onChange={(e) => setMobile(e.target.value.replace(/\D/g, ''))}
                      disabled={isSending}
                      className="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-1 focus:ring-brand-green focus:border-brand-green outline-none font-semibold tracking-wide"

                  </div>
                </div>

                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase font-mono tracking-wider">Referral Code (Optional)</label>

                    type="text"
                    placeholder="Enter referral code if any"

                    onChange={(e) => setReferralCodeInput(e.target.value)}

                  />
                </div>

                <div className="flex items-start space-x-2 text-[10px] text-gray-400 bg-gray-50 p-3 rounded-xl border border-gray-100">
                  <Icon name="shieldCheck" size={14} className="text-brand-orange shrink-0 mt-0.5" />
                  <span>Strictly <strong>1 Account per device</strong>. Cheat systems are auto-banned permanently.</span>
                </div>

                <button
                  type="submit"
                  disabled={isSending || mobile.length !== 10}
                  className="w-full py-3.5 bg-brand-green hover:bg-brand-green-hover disabled:opacity-50 text-white rounded-2xl font-bold flex items-center justify-center space-x-2 shadow-sm active:scale-98 cursor-pointer transition-transform duration-100"

      const [selectedUpiApp, setSelectedUpiApp] = useState('paytm');
      const [upiPhone, setUpiPhone] = useState('');
      const [amount, setAmount] = useState('10');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [successMsg, setSuccessMsg] = useState('');
      const [withdrawals, setWithdrawals] = useState([]);
      const [isLoadingHistory, setIsLoadingHistory] = useState(true);
      const [statusFilter, setStatusFilter] = useState('all');

      useEffect(() => {
        const unsubscribe = db.collection('withdrawals')
          .where('uid', '==', user.uid)
          .orderBy('createdAt', 'desc')
          .onSnapshot((snapshot) => {
            const records = [];
            snapshot.forEach(doc => {
              records.push({ id: doc.id, ...doc.data() });
            });
            setWithdrawals(records);
            setIsLoadingHistory(false);
          }, (err) => {
            console.error(err);
            setIsLoadingHistory(false);
          });
        return () => unsubscribe();
      }, [user.uid]);

      const handleWithdrawSubmit = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        setSuccessMsg('');

        if (user.blocked) {
          setErrorMsg('Account block. Payouts are barred.');
          return;
        }

        let finalUpi = '';
        if (withdrawMethod === 'vpa') {
          const upiPattern = /^[\w.\-_]{2,256}@[a-zA-Z]{2,64}$/;
          if (!upiPattern.test(upiId.trim())) {
            setErrorMsg('Invalid custom UPI ID (e.g. name@paytm).');
            return;
          }
          finalUpi = upiId.trim();
        } else {
          if (upiPhone.trim().length !== 10) {
            setErrorMsg('Invalid 10-digit mobile number.');
            return;
          }
          const suf = selectedUpiApp === 'paytm' ? 'paytm' : selectedUpiApp === 'phonepe' ? 'ybl' : selectedUpiApp === 'gpay' ? 'okaxis' : 'upi';
          finalUpi = `${upiPhone.trim()}@${suf}`;
        }

        const amt = Number(amount);
        if (isNaN(amt) || amt < 10) {
          setErrorMsg('Minimum withdrawal limit is ₹10.');
          return;
        }

        if (amt > user.balance) {
          setErrorMsg('Insufficient balance in wallet.');
          return;
        }

        setIsSubmitting(true);

        try {
          const userRef = db.collection('users').doc(user.uid);
          const withdrawalId = `WD_${Date.now()}_${Math.random().toString(36).substring(2, 6).toUpperCase()}`;
          const withdrawalRef = db.collection('withdrawals').doc(withdrawalId);

          await db.runTransaction(async (transaction) => {
            const userSnap = await transaction.get(userRef);
            if (!userSnap.exists) throw new Error('User does not exist.');
            const uData = userSnap.data();
            if (uData.balance < amt) throw new Error('Insufficient balance.');

            transaction.update(userRef, { balance: uData.balance - amt });
            transaction.set(withdrawalRef, {
              uid: user.uid,
              mobile: user.mobile,
              upiId: finalUpi,
              amount: amt,
              status: 'Pending',
              balanceBefore: uData.balance,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            });
          });

          setSuccessMsg('Withdrawal request placed! Credited within 24 hours.');
          setUpiId('');
          setUpiPhone('');
          setAmount('10');
          await onUpdateUser({ balance: user.balance - amt });
          setTimeout(() => setSuccessMsg(''), 5000);
        } catch (err) {
          setErrorMsg(err.message || 'Transaction error.');
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="space-y-5 animate-fade-in">
          <div className="bg-gradient-to-tr from-brand-green to-emerald-600 rounded-3xl p-5 text-white flex justify-between items-center relative">

              <span className="text-[10px] font-mono uppercase opacity-90">Withdrawable Cash</span>
              <h2 className="text-3xl font-display font-black mt-1 font-mono">₹{user.balance.toFixed(2)}</h2>
              <p className="text-[10px] opacity-75 mt-0.5">Min withdrawal ₹10</p>
            </div>
            <div className="w-11 h-11 bg-white/20 rounded-xl flex items-center justify-center">
              <Icon name="creditCard" size={22} />
            </div>
          </div>

          <div className="bg-white border border-gray-100 rounded-3xl p-5 space-y-4">

            {successMsg && <div className="bg-green-50 border border-green-200 text-green-700 p-3 rounded-xl text-xs font-semibold">{successMsg}</div>}
            {errorMsg && <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-xs font-semibold">{errorMsg}</div>}

            <div className="flex border rounded-xl p-1 bg-gray-50 text-xs font-bold">
              <button type="button" onClick={() => setWithdrawMethod('vpa')} className={`flex-1 py-1.5 rounded-lg text-center ${withdrawMethod === 'vpa' ? 'bg-white text-gray-800 shadow-2xs' : 'text-gray-400'}`}>Custom VPA</button>
              <button type="button" onClick={() => setWithdrawMethod('phone_upi')} className={`flex-1 py-1.5 rounded-lg text-center ${withdrawMethod === 'phone_upi' ? 'bg-white text-gray-800 shadow-2xs' : 'text-gray-400'}`}>Phone UPI suffix</button>
            </div>

            <form onSubmit={handleWithdrawSubmit} className="space-y-4">
              {withdrawMethod === 'vpa' ? (
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase">Custom UPI Address</label>
                  <input type="text" required placeholder="e.g. name@paytm" value={upiId} onChange={e => setUpiId(e.target.value)} disabled={isSubmitting} className="w-full mt-1 px-3 py-2 border rounded-xl text-xs" />
                </div>
              ) : (
                <div className="space-y-3">
                  <div>
                    <label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Select App</label>
                    <div className="grid grid-cols-4 gap-1.5">
                      {['paytm', 'phonepe', 'gpay', 'bhim'].map(ap => (
                        <button key={ap} type="button" onClick={() => setSelectedUpiApp(ap)} className={`py-1.5 border rounded-lg text-[10px] font-black capitalize ${selectedUpiApp === ap ? 'bg-brand-green text-white border-brand-green' : 'bg-white text-gray-500'}`}>{ap}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-gray-400 uppercase">10-Digit Phone Number</label>
                    <input type="tel" maxLength={10} placeholder="Registered UPI mobile" value={upiPhone} onChange={e => setUpiPhone(e.target.value.replace(/\D/g,''))} disabled={isSubmitting} className="w-full mt-1 px-3 py-2 border rounded-xl font-mono text-xs" />
                    {upiPhone.length === 10 && (
                      <div className="mt-1.5 text-[9px] text-brand-green font-bold">VPA address: {upiPhone}@{selectedUpiApp === 'paytm' ? 'paytm' : selectedUpiApp === 'phonepe' ? 'ybl' : selectedUpiApp === 'gpay' ? 'okaxis' : 'upi'}</div>
                    )}
                  </div>
                </div>
              )}

              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase">Amount (₹)</label>
                <div className="relative mt-1">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-xs">₹</span>
                  <input type="number" min="10" max={user.balance} value={amount} onChange={e => setAmount(e.target.value)} disabled={isSubmitting} className="w-full pl-6 pr-16 py-2 border rounded-xl font-mono text-xs" />
                  <button type="button" onClick={() => setAmount(Math.floor(user.balance).toString())} className="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] bg-green-50 border border-green-200 text-brand-green px-2 py-0.5 rounded">Max</button>
                </div>
              </div>

              <button type="submit" disabled={isSubmitting || user.balance < 10} className="w-full py-3 bg-brand-green text-white font-bold rounded-2xl text-xs hover:opacity-95">
                {isSubmitting ? 'Processing...' : 'Request Payout'}
              </button>
            </form>
          </div>

          {/* History */}
          <div className="bg-white border border-gray-100 rounded-3xl p-4 space-y-3">
            <h3 className="font-bold text-xs text-gray-800">My Withdrawal Requests ({withdrawals.length})</h3>
            
            <div className="flex bg-gray-50 rounded-lg p-0.5 gap-1 text-[10px] font-bold">
              {['all', 'Pending', 'Approved', 'Rejected'].map(fl => (
                <button key={fl} type="button" onClick={() => setStatusFilter(fl)} className={`flex-1 py-1 rounded-md text-center capitalize ${statusFilter === fl ? 'bg-white text-gray-800 shadow-3xs' : 'text-gray-400'}`}>{fl === 'Approved' ? 'Paid' : fl}</button>
              ))}
            </div>

            {isLoadingHistory ? (
              <p className="text-center text-[10px] py-4 text-gray-400">Loading history logs...</p>
            ) : (
              (() => {
                const list = statusFilter === 'all' ? withdrawals : withdrawals.filter(w => w.status === statusFilter);
                if (list.length === 0) return <p className="text-center text-[10px] py-6 text-gray-400">No transaction records found.</p>;
                return (
                  <div className="space-y-2 max-h-[250px] overflow-y-auto no-scrollbar">
                    {list.map(req => (
                      <div key={req.id} className="p-3 border rounded-xl flex flex-col space-y-1 text-xs">
                        <div className="flex justify-between text-[9px] font-mono font-bold text-gray-400">
                          <span>ID: {req.id}</span>
                          <span className={req.status === 'Approved' ? 'text-green-500' : req.status === 'Rejected' ? 'text-red-500' : 'text-amber-500'}>
                            {req.status === 'Approved' ? 'PAID' : req.status.toUpperCase()}
                          </span>
                        </div>
                        <div className="flex justify-between items-center pt-1">
                          <div>
                            <p className="font-bold text-gray-700">{req.upiId}</p>
                            <p className="text-[9px] text-gray-400 font-mono mt-0.5">{new Date(req.createdAt).toLocaleString('en-IN')}</p>
                          </div>
                          <p className="text-sm font-black text-gray-900 font-mono">₹{req.amount}</p>
                        </div>
                        {req.status === 'Rejected' && req.rejectReason && (
                          <div className="text-[10px] text-red-600 bg-red-50 p-2 rounded mt-1">Declined: {req.rejectReason}</div>
                        )}
                      </div>
                    ))}
                  </div>
                );
              })()
            )}
          </div>
        </div>
      );
    }

    // --- ADMIN VIEW COMPONENT ---
    function AdminView() {
      const [users, setUsers] = useState([]);
      const [withdrawals, setWithdrawals] = useState([]);
      const [activeSubTab, setActiveSubTab] = useState('withdrawals');
      const [userSearch, setUserSearch] = useState('');
      const [withdrawalSearch, setWithdrawalSearch] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [statusFilter, setStatusFilter] = useState('Pending');
      const [selectedWd, setSelectedWd] = useState(null);
      
      const [rejectId, setRejectId] = useState(null);
      const [rejectReason, setRejectReason] = useState('');
      
      const [editBalanceId, setEditBalanceId] = useState(null);
      const [newBal, setNewBal] = useState('');

      useEffect(() => {
        const unsubUsers = db.collection('users').orderBy('createdAt', 'desc').onSnapshot(snap => {
          const list = [];
          snap.forEach(d => list.push(d.data()));
          setUsers(list);
        });
        const unsubWithdrawals = db.collection('withdrawals').orderBy('createdAt', 'desc').onSnapshot(snap => {
          const list = [];
          snap.forEach(d => list.push({ id: d.id, ...d.data() }));
          setWithdrawals(list);
          setIsLoading(false);
        });
        return () => { unsubUsers(); unsubWithdrawals(); };
      }, []);

      const isDup = (dId) => {
        if (!dId) return false;
        return users.filter(u => u.deviceId === dId).length > 1;
      };

      const handleApprove = async (id) => {
        if (!confirm('Approve this withdrawal payout?')) return;
        try {
          await db.collection('withdrawals').doc(id).update({
            status: 'Approved',
            updatedAt: new Date().toISOString()
          });
          alert('Approved successfully.');
        } catch (e) {
          alert('Approval failed.');
        }
      };

      const handleRejectConfirm = async () => {
        if (!rejectId || !rejectReason.trim()) return;
        try {
          const wdRef = db.collection('withdrawals').doc(rejectId);
          await db.runTransaction(async (transaction) => {
            const snap = await transaction.get(wdRef);
            const data = snap.data();
            const uRef = db.collection('users').doc(data.uid);
            const uSnap = await transaction.get(uRef);
            if (uSnap.exists) {
              transaction.update(uRef, { balance: uSnap.data().balance + data.amount });
            }
            transaction.update(wdRef, {
              status: 'Rejected',
              rejectReason: rejectReason.trim(),
              updatedAt: new Date().toISOString()
            });
          });
          setRejectId(null);
          setRejectReason('');
          alert('Rejected and refunded wallet.');
        } catch (e) {
          alert('Rejection failed.');
        }
      };

      const handleBlockToggle = async (target) => {
        const bl = !target.blocked;
        if (!confirm(`Are you sure to ${bl ? 'BLOCK' : 'UNBLOCK'} user + all duplicate profiles?`)) return;
        try {
          if (bl) {
            const list = users.filter(u => u.deviceId === target.deviceId);
            const batch = db.batch();
            list.forEach(u => {
              batch.update(db.collection('users').doc(u.uid), { blocked: true });
            });
            await batch.commit();
            alert('Blocked device accounts.');
          } else {
            await db.collection('users').doc(target.uid).update({ blocked: false });
            alert('Unblocked successfully.');
          }
        } catch (e) {
          alert('Action failed.');
        }
      };

      const handleSaveBalance = async (uid) => {
        const num = Number(newBal);
        if (isNaN(num) || num < 0) return;
        try {
          await db.collection('users').doc(uid).update({ balance: num });
          setEditBalanceId(null);
          setNewBal('');
          alert('Balance adjusted.');
        } catch (e) {
          alert('Save failed.');
        }
      };

      const handleExport = () => {
        const headers = ['Date', 'User', 'Mobile', 'UPI_ID', 'Amount_INR', 'Status', 'Device_ID'];
        const csvRows = withdrawals.map(w => {
          const date = new Date(w.createdAt).toLocaleString('en-IN');
          return [date, w.id, w.mobile, w.upiId, w.amount, w.status, w.uid];
        });
        const content = "data:text/csv;charset=utf-8," + [headers.join(','), ...csvRows.map(r => r.join(','))].join('\n');
        const link = document.createElement("a");
        link.href = encodeURI(content);
        link.download = `withdrawals_report_${Date.now()}.csv`;
        link.click();
      };

      const filteredWds = withdrawals.filter(w => {
        if (statusFilter !== 'All' && w.status !== statusFilter) return false;
        const val = withdrawalSearch.toLowerCase().trim();
        if (val) {
          return w.mobile.includes(val) || w.upiId.toLowerCase().includes(val) || w.id.toLowerCase().includes(val);
        }
        return true;
      });

      const filteredUsersList = users.filter(u => {
        const val = userSearch.toLowerCase().trim();
        if (val) {
          return u.mobile.includes(val) || (u.fullName && u.fullName.toLowerCase().includes(val)) || u.deviceId.toLowerCase().includes(val);
        }
        return true;
      });

      return (
        <div className="space-y-4 animate-fade-in text-xs">
          <div className="bg-gradient-to-tr from-rose-700 to-amber-700 rounded-2xl p-4 text-white">
            <h2 className="font-bold text-sm">Security & Integrity Panel</h2>
            <p className="text-[10px] opacity-80 mt-0.5">Control duplicate users and approve payout receipts</p>
          </div>

          <div className="flex bg-white rounded-xl p-1 shadow-2xs font-bold text-center">
            <button className={`flex-1 py-2 rounded-lg ${activeSubTab === 'withdrawals' ? 'bg-slate-900 text-white' : 'text-gray-400'}`} onClick={() => setActiveSubTab('withdrawals')}>Withdrawals</button>
            <button className={`flex-1 py-2 rounded-lg ${activeSubTab === 'users' ? 'bg-slate-900 text-white' : 'text-gray-400'}`} onClick={() => setActiveSubTab('users')}>User Directory</button>
          </div>

          {activeSubTab === 'withdrawals' ? (
            <div className="space-y-3">
              <div className="bg-white p-4 rounded-2xl space-y-3">
                <div className="flex gap-2">
                  <input type="text" placeholder="Search mobile/UPI..." value={withdrawalSearch} onChange={e => setWithdrawalSearch(e.target.value)} className="flex-1 px-3 py-2 border rounded-xl" />
                  <button onClick={handleExport} className="bg-emerald-600 text-white font-bold px-3 py-2 rounded-xl">Export</button>
                </div>
                <div className="flex gap-1 text-[10px] font-bold">
                  {['Pending', 'Approved', 'Rejected', 'All'].map(s => (
                    <button key={s} onClick={() => setStatusFilter(s)} className={`flex-1 py-1 rounded-md ${statusFilter === s ? 'bg-slate-800 text-white' : 'bg-gray-100 text-gray-500'}`}>{s === 'Approved' ? 'Paid' : s}</button>
                  ))}
                </div>
              </div>

              <div className="space-y-2">
                {filteredWds.map(w => {
                  const dup = isDup(w.uid);
                  return (
                    <div key={w.id} className={`p-3 border rounded-xl bg-white space-y-2 ${dup ? 'border-red-400 bg-red-50/10' : ''}`}>
                      <div className="flex justify-between font-mono text-[9px] font-bold text-gray-400">
                        <span>REF: {w.id}</span>
                        <span className={w.status === 'Approved' ? 'text-green-600' : w.status === 'Rejected' ? 'text-red-600' : 'text-amber-500'}>{w.status}</span>
                      </div>
                      <div className="flex justify-between items-end">
                        <div>
                          <p className="font-bold text-gray-800">{w.upiId}</p>
                          <p className="text-[10px] text-gray-400 mt-0.5">Mob: {w.mobile}</p>
                          {dup && <span className="inline-block bg-red-100 text-red-700 font-extrabold text-[8px] px-2 py-0.5 rounded mt-1 animate-pulse">DUPLICATE ACCOUNT DETECTED</span>}
                        </div>
                        <p className="text-sm font-black text-gray-900 font-mono">₹{w.amount}</p>
                      </div>

                      {w.status === 'Pending' && (
                        <div className="flex justify-end space-x-2 pt-1 border-t">
                          <button onClick={() => setSelectedWd(w)} className="bg-slate-100 text-gray-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">View Details</button>
                          <button onClick={() => startRejectWithdrawal(w.id)} className="bg-red-50 border border-red-200 text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">Decline</button>
                          <button onClick={() => handleApprove(w.id)} className="bg-green-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">Approve</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <div className="space-y-3">
              <input type="text" placeholder="Search directory..." value={userSearch} onChange={e => setUserSearch(e.target.value)} className="w-full px-3 py-2 border rounded-xl bg-white" />
              <div className="space-y-2">
                {filteredUsersList.map(u => {
                  const dup = isDup(u.deviceId);
                  return (
                    <div key={u.uid} className={`p-3 border rounded-xl bg-white space-y-2 ${dup ? 'border-red-400' : ''}`}>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-gray-800 font-mono">{u.mobile}</span>
                        <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${u.blocked ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>{u.blocked ? 'Blocked' : 'Active'}</span>
                      </div>
                      <div className="text-[10px] text-gray-500 space-y-0.5 font-mono">
                        <p>Name: {u.fullName || 'Uncompleted Profile'}</p>
                        <p>State: {u.state || '-'}</p>
                        <p>Device Key: {u.deviceId}</p>
                        <p>Total Invited: {u.totalReferrals}</p>
                        <p className="font-bold text-brand-green">Wallet Cash: ₹{u.balance}</p>
                      </div>
                      <div className="flex justify-end space-x-2 pt-1.5 border-t">
                        <button onClick={() => { setEditBalanceId(u.uid); setNewBal(u.balance.toString()); }} className="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-[10px] font-bold">Adjust Cash</button>
                        <button onClick={() => handleBlockToggle(u)} className={`px-2.5 py-1 rounded-md text-[10px] font-bold ${u.blocked ? 'bg-green-600 text-white' : 'bg-red-50 text-red-600 border border-red-100'}`}>{u.blocked ? 'Activate' : 'Block User'}</button>
                      </div>

                      {editBalanceId === u.uid && (
                        <div className="pt-2 flex gap-1 items-center">
                          <input type="number" value={newBal} onChange={e => setNewBal(e.target.value)} className="w-20 px-2 py-1 border rounded" />
                          <button onClick={() => handleSaveBalance(u.uid)} className="bg-slate-900 text-white px-2.5 py-1 rounded text-[10px] font-bold">Save</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Decline Reason Modal */}
          {rejectId && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white p-5 rounded-2xl w-full max-w-sm space-y-3">
                <h4 className="font-bold text-sm text-gray-800">Decline Payout Request</h4>
                <textarea required value={rejectReason} onChange={e => setRejectReason(e.target.value)} placeholder="Provide reject explanation (e.g. Invalid UPI ID)" className="w-full border p-2 text-xs rounded-xl h-24" />
                <div className="flex space-x-2">
                  <button onClick={() => setRejectId(null)} className="w-1/2 py-2 border rounded-xl text-xs">Cancel</button>
                  <button onClick={handleRejectConfirm} className="w-1/2 py-2 bg-red-600 text-white rounded-xl text-xs font-bold">Confirm Reject</button>
                </div>
              </div>
            </div>
          )}

          {/* View Details Popup */}
          {selectedWd && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white p-5 rounded-2xl w-full max-w-md space-y-4 max-h-[90vh] overflow-y-auto no-scrollbar">
                <div className="flex justify-between items-center border-b pb-2">
                  <h4 className="font-bold text-sm">Payout User Details</h4>
                  <button onClick={() => setSelectedWd(null)} className="font-bold text-gray-500">✕</button>
                </div>
                {(() => {
                  const associated = users.find(u => u.uid === selectedWd.uid);
                  const userHistory = withdrawals.filter(w => w.uid === selectedWd.uid);
                  return (
                    <div className="space-y-3 text-[11px] font-mono">
                      <div className="bg-gray-50 p-3 rounded-xl space-y-1">
                        <p><strong>Device ID:</strong> {selectedWd.uid}</p>
                        <p><strong>Mobile Number:</strong> {selectedWd.mobile}</p>
                        <p><strong>Registered Name:</strong> {associated ? associated.fullName || 'Not complete' : 'Anonymous'}</p>
                        <p><strong>Current Wallet Balance:</strong> ₹{associated ? associated.balance : '0'}</p>
                        <p><strong>Total Referral Invites:</strong> {associated ? associated.totalReferrals : '0'}</p>
                        <p><strong>Join Date:</strong> {associated ? new Date(associated.createdAt).toLocaleDateString('en-IN') : '-'}</p>
                        <p><strong>Is Duplicate device:</strong> {isDup(associated?.deviceId) ? 'YES (Highlight RED)' : 'No'}</p>
                      </div>
                      <div>
                        <h5 className="font-bold text-xs font-sans text-gray-800 mb-2">All Past Payout Requests:</h5>
                        <div className="space-y-1.5 max-h-[150px] overflow-y-auto">
                          {userHistory.map(h => (
                            <div key={h.id} className="p-2 border rounded-lg flex justify-between items-center">
                              <div>
                                <p className="font-bold text-gray-800">₹{h.amount}</p>
                                <p className="text-[9px] text-gray-400">{new Date(h.createdAt).toLocaleDateString()}</p>
                              </div>
                              <span className="font-bold uppercase tracking-wide">{h.status}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- MAIN APP WRAPPER COMPONENT ---
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [authChecked, setAuthChecked] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const localUid = localStorage.getItem('roztaskpro_user_uid');
        if (localUid) {
          const userRef = db.collection('users').doc(localUid);
          const unsubscribe = userRef.onSnapshot((snap) => {
            if (snap.exists) {
              setCurrentUser(snap.data());
            } else {
              setCurrentUser(null);
              localStorage.removeItem('roztaskpro_user_uid');
            }
            setLoading(false);
            setAuthChecked(true);
          }, (err) => {
            console.error(err);
            setLoading(false);
            setAuthChecked(true);
          });
          return () => unsubscribe();
        } else {
          setCurrentUser(null);
          setLoading(false);
          setAuthChecked(true);
        }
      }, []);

      const handleUpdateUser = async (updatedData) => {
        if (!currentUser) return;
        try {
          await db.collection('users').doc(currentUser.uid).set(updatedData, { merge: true });
        } catch (e) {
          console.error(e);
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('roztaskpro_user_uid');
        setCurrentUser(null);
        setActiveTab('dashboard');
      };

      const handleToggleAdminDev = async () => {
        if (!currentUser) return;
        try {
          const target = !currentUser.isAdmin;
          await db.collection('users').doc(currentUser.uid).update({ isAdmin: target });
          if (!target && activeTab === 'admin') {
            setActiveTab('dashboard');
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleAuthSuccess = (userObj) => {
        localStorage.setItem('roztaskpro_user_uid', userObj.uid);
        setCurrentUser(userObj);
        setActiveTab('dashboard');
      };

      if (loading || !authChecked) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50">
            <div className="w-12 h-12 border-4 border-brand-green border-t-transparent rounded-full animate-spin mb-4" />
            <p className="text-sm font-display font-black tracking-tight text-gray-800">
              <span className="text-brand-green">Roz</span>
              <span className="text-brand-orange">taskPro</span>
            </p>
            <p className="text-[10px] text-gray-400 font-mono mt-1 uppercase tracking-widest">Securing Connection...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-100 flex justify-center items-start md:py-8 font-sans antialiased">
          {/* Mobile Shell Frame */}
          <div className="w-full max-w-md bg-white min-h-screen md:min-h-[88vh] md:rounded-3xl shadow-2xl relative flex flex-col pb-20 overflow-y-auto no-scrollbar border border-gray-100">
            {!currentUser ? (
              <AuthView onAuthSuccess={handleAuthSuccess} />
            ) : (
              <>
                {/* Header */}
                <header className="sticky top-0 z-40 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between shadow-xs rounded-b-2xl">
                  <div className="flex items-center space-x-2">
                    <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-brand-orange to-brand-green flex items-center justify-center text-white font-display font-bold text-lg shadow-sm">R</div>
                    <div>
                      <h1 className="text-xl font-display font-black tracking-tight"><span className="text-brand-green">Roz</span><span className="text-brand-orange">taskPro</span></h1>
                      <p className="text-[9px] text-gray-400 font-bold font-mono">1 Phone = 1 Account</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center space-x-1.5">
                    <div className="flex items-center space-x-1 bg-green-50 border border-green-100 text-brand-green font-bold text-sm px-2.5 py-1 rounded-full">
                      <span className="text-xs">₹</span>
                      <span className="font-mono text-base">{currentUser.balance.toFixed(2)}</span>
                    </div>
                    
                    {/* Toggle developer Admin button */}
                    <button onClick={handleToggleAdminDev} className={`p-1.5 rounded-full border transition-all cursor-pointer ${currentUser.isAdmin ? 'bg-orange-50 border-orange-200 text-brand-orange' : 'bg-gray-50 text-gray-400'}`}>
                      <Icon name="shield" size={16} />
                    </button>
                    
                    <button onClick={handleLogout} className="p-1.5 rounded-full bg-red-50 text-red-500 hover:bg-red-100 cursor-pointer">
                      <Icon name="logout" size={16} />
                    </button>
                  </div>
                </header>

                {/* Main Body */}
                <main className="flex-1 px-4 py-4">
                  {activeTab === 'dashboard' && <DashboardView user={currentUser} onUpdateUser={handleUpdateUser} />}
                  {activeTab === 'refer' && <ReferView user={currentUser} />}
                  {activeTab === 'withdraw' && <WithdrawView user={currentUser} onUpdateUser={handleUpdateUser} />}
                  {activeTab === 'admin' && currentUser.isAdmin && <AdminView />}
                </main>

                {/* Navigation Bar */}
                <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 py-2 flex justify-around items-center shadow-lg rounded-t-2xl z-45">
                  {[
                    { id: 'dashboard', label: 'Earning', icon: 'home' },
                    { id: 'refer', label: 'Refer', icon: 'gift' },
                    { id: 'withdraw', label: 'Withdraw', icon: 'creditCard' },
                  ].concat(currentUser.isAdmin ? [{ id: 'admin', label: 'Admin', icon: 'shield' }] : []).map(tb => (
                    <button key={tb.id} onClick={() => setActiveTab(tb.id)} className={`flex flex-col items-center justify-center py-1 px-3.5 rounded-xl cursor-pointer ${activeTab === tb.id ? 'text-brand-green font-bold scale-102' : 'text-gray-400'}`}>
                      <Icon name={tb.icon} size={18} />
                      <span className="text-[10px] mt-0.5">{tb.label}</span>
                    </button>
                  ))}
                </nav>
              </>
            )}
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
